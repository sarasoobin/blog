<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title | escape }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="logo-area" href="{{ '/' | relative_url }}">
        <span class="logo-mark">S</span>
        <span class="logo-text">SOOBIN</span>
      </a>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}" class="nav-link {% if page.url == '/' %}active{% endif %}">Home</a>
        <a href="{{ '/posts/' | relative_url }}" class="nav-link {% if page.url contains '/posts' %}active{% endif %}">Posts</a>
        <a href="{{ '/about/' | relative_url }}" class="nav-link {% if page.url contains '/about' %}active{% endif %}">About</a>
      </nav>
    </div>
  </header>

  <main class="site-content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-top">
        <div class="footer-logo">
          <span class="logo-mark small">S</span>
          <span class="footer-name">SOOBIN</span>
        </div>
        <div class="footer-links">
          {% if site.github_username %}
          <a href="https://github.com/{{ site.github_username }}">GitHub</a>
          {% endif %}
          {% if site.email %}
          <a href="mailto:{{ site.email }}">Email</a>
          {% endif %}
        </div>
      </div>
      <div class="footer-divider"></div>
      <p class="footer-copy">&copy; 2026 이수빈. All rights reserved. Built with Jekyll.</p>
    </div>
  </footer>
</body>
</html>
